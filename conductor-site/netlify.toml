# Netlify config for The Conductor Barbershop (static site)
# Drag-and-drop this whole folder onto app.netlify.com/drop, or connect it
# to a Git repo — either way these settings apply.

[build]
  publish = "."
  # No build command needed — plain HTML/CSS/JS.

# Long-cache static assets (images, css, js). HTML stays fresh.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
